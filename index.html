<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的纪念日 · 2019 — 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== 惊喜粒子效果 ===== */
    .surprise-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
    }

    /* 图片点击提示 */
    .media-image {
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .media-image:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 70px rgba(74, 55, 40, 0.25);
    }

    :root {
      --rose: #c9846a;
      --rose-light: #e8c5b8;
      --gold: #b8966e;
      --cream: #fdf8f4;
      --ivory: #f5ede6;
      --text: #4a3728;
      --text-soft: #6b5548;
      --white: #ffffff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', 'Noto Serif SC', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* ===== 轮播容器 ===== */
    .fullpage-slider {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .slider-container {
      display: flex;
      height: 100vh;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .slide {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    /* ===== 页面指示器 ===== */
    .page-indicators {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
      max-height: 80vh;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 10px 0;
    }

    .page-indicators::-webkit-scrollbar {
      display: none;
    }

    .indicator-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(201, 132, 106, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      flex-shrink: 0;
    }

    .indicator-dot:hover {
      background: rgba(201, 132, 106, 0.6);
    }

    .indicator-dot.active {
      background: var(--rose);
      transform: scale(1.3);
      box-shadow: 0 0 15px rgba(201, 132, 106, 0.4);
    }

    .indicator-label {
      position: absolute;
      right: 25px;
      top: 50%;
      transform: translateY(-50%) translateX(100%);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-soft);
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .indicator-dot:hover .indicator-label {
      opacity: 1;
      transform: translateY(-50%) translateX(-35px);
    }

    /* 分类标签 */
    .indicator-group-label {
      font-size: 0.65rem;
      color: var(--rose);
      opacity: 0.8;
      text-align: right;
      padding: 8px 0 15px 0;
      letter-spacing: 0.15em;
      border-bottom: 1px solid rgba(201, 132, 106, 0.2);
      margin-bottom: 5px;
      font-weight: 300;
    }

    .indicator-period {
      position: relative;
      display: flex;
      align-items: center;
      padding: 4px 0;
    }

    .indicator-year {
      font-size: 0.55rem;
      color: var(--text-soft);
      margin-left: 8px;
      opacity: 0.6;
      white-space: nowrap;
    }

    /* ===== 导航箭头 ===== */
    .nav-arrows {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      background: rgba(253, 248, 244, 0.95);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(74, 55, 40, 0.1);
      border: 1px solid var(--rose-light);
    }

    .nav-arrow {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--rose);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-arrow:hover {
      color: var(--white);
      transform: scale(1.1);
    }

    .nav-arrow:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 播放暂停按钮 */
    .play-pause-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--rose);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-pause-btn:hover {
      color: var(--white);
      transform: scale(1.1);
    }

    /* 进度条 */
    .slide-progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--rose);
      z-index: 10;
      transition: width 0.1s linear;
    }

    /* ===== Hero 页面 ===== */
    .slide-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(201,132,106,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(184,150,110,0.10) 0%, transparent 60%),
        var(--cream);
    }

    .hero-date {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--rose);
    }

    .hero-subtitle {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .day-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .day-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 600;
      color: var(--rose);
      line-height: 1;
    }

    .day-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-soft);
      text-transform: uppercase;
    }

    /* ===== 图片/视频/PDF 页面 ===== */
    .slide-media {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px) brightness(1.1) saturate(0.7);
      transform: scale(1.05);
    }

    .media-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 900px;
      padding: 2rem;
      text-align: center;
      animation: mediaFadeIn 1s ease;
    }

    .media-image, .media-video {
      max-width: 85%;
      max-height: 60vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(74, 55, 40, 0.15);
    }

    .media-video {
      background: #000;
    }

    .pdf-container {
      width: 64%;
      height: 72vh;
      max-width: 1040px;
      max-height: 720px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(74, 55, 40, 0.15);
      overflow: hidden;
    }

    .pdf-container embed,
    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 长图容器 */
    .longimage-container {
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .longimage-container img {
      pointer-events: auto;
    }
    }

    .media-text {
      margin-top: 2rem;
      padding: 1.2rem 1.5rem;
      background: rgba(253, 248, 244, 0.85);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      animation: mediaFadeIn 1s ease 0.3s both;
      max-width: 650px;
    }

    .media-date {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .media-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: var(--text);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .media-quote {
      font-size: 1.05rem;
      color: var(--text-soft);
      line-height: 1.9;
      font-style: italic;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    /* ===== 信 ===== */
    .slide-letter {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(201,132,106,0.08) 0%, transparent 50%),
        var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .letter-card {
      max-width: 700px;
      background: var(--white);
      border-radius: 4px;
      padding: 4rem 4.5rem;
      box-shadow:
        0 2px 4px rgba(74,55,40,0.06),
        0 20px 80px rgba(74,55,40,0.1);
      position: relative;
      animation: letterFadeIn 1s ease;
    }

    .letter-card::before {
      content: '';
      position: absolute;
      top: 2.5rem; bottom: 2.5rem;
      left: 3rem;
      width: 1px;
      background: rgba(232, 197, 184, 0.5);
    }

    .letter-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--ivory);
    }

    .letter-date {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
    }

    .letter-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--rose);
    }

    .letter-body {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1rem;
      line-height: 2;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 2.5rem;
      min-height: 400px;
    }

    .letter-sign {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-soft);
      text-align: right;
      font-size: 1rem;
    }

    /* ===== 情感终章 ===== */
    .slide-final {
      background:
        radial-gradient(ellipse at 50% 30%, rgba(201,132,106,0.15) 0%, transparent 50%),
        linear-gradient(180deg, var(--cream) 0%, var(--ivory) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 2rem 6rem 2rem;
      text-align: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .final-ornament {
      font-size: 3rem;
      color: var(--rose-light);
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .final-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      color: var(--text);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .final-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--rose);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .final-content {
      max-width: 750px;
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 2.2;
      color: var(--text);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
      min-height: 50px;
    }

    .final-content p {
      margin-bottom: 1.5rem;
      min-height: 30px;
    }

    .final-content em {
      color: var(--rose);
      font-style: italic;
    }

    .final-heart {
      font-size: 2rem;
      color: var(--rose);
      margin-top: 2rem;
      margin-bottom: 1rem;
      animation: heartBeat 1.5s ease-in-out infinite;
      display: block;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
    }

    .final-footer {
      margin-top: 1rem;
      margin-bottom: 100px;
      font-size: 0.85rem;
      color: var(--text-soft);
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
      display: block;
      padding-bottom: 20px;
    }

    /* ===== 时间线动画 ===== */
    .hero-timeline {
      width: 80%;
      max-width: 800px;
      margin-top: 3rem;
      position: relative;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }

    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      transform: translateY(-50%);
      animation: lineGrow 3s ease 2s forwards;
    }

    @keyframes lineGrow {
      from { width: 0; }
      to { width: 100%; }
    }

    .timeline-nodes {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .timeline-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: scale(0);
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--rose);
      box-shadow: 0 0 0 3px var(--cream), 0 0 10px rgba(201, 132, 106, 0.5);
      margin-bottom: 0.5rem;
      position: relative;
    }

    .timeline-dot::after {
      content: '💕';
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      font-size: 1.2rem;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .timeline-node.active .timeline-dot::after {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }

    .timeline-label {
      font-size: 0.7rem;
      color: var(--text-soft);
      white-space: nowrap;
      text-align: center;
      margin-top: 0.3rem;
      line-height: 1.2;
    }

    .timeline-date {
      font-size: 0.65rem;
      color: var(--rose);
      margin-top: 0.15rem;
      font-weight: 300;
      line-height: 1;
    }

    /* ===== 光效增强 ===== */
    .glow-text {
      text-shadow: 
        0 0 10px rgba(201, 132, 106, 0.3),
        0 0 20px rgba(201, 132, 106, 0.2),
        0 0 30px rgba(201, 132, 106, 0.1);
    }

    .glow-image {
      position: relative;
    }

    .glow-image::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 20px;
      background: radial-gradient(
        ellipse at center,
        rgba(201, 132, 106, 0.2) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: -1;
    }

    .glow-image:hover::after {
      opacity: 1;
    }

    /* ===== 打字机效果 ===== */
    .typewriter {
      overflow: hidden;
      border-right: 2px solid var(--rose);
      white-space: nowrap;
      animation: typing 3s steps(40, end), blink-caret 0.75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent; }
      50% { border-color: var(--rose); }
    }

    .typewriter-text {
      display: inline;
    }

    /* ===== 章节过渡页 ===== */
    .slide-chapter {
      background: linear-gradient(135deg, var(--cream) 0%, var(--ivory) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .chapter-bg-circle {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 132, 106, 0.1) 0%, transparent 70%);
      animation: chapterPulse 3s ease-in-out infinite;
    }

    .chapter-content {
      text-align: center;
      z-index: 1;
      animation: chapterFadeIn 1s ease;
    }

    .chapter-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: chapterIconBounce 2s ease-in-out infinite;
    }

    @keyframes chapterPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    @keyframes chapterFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes chapterIconBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .chapter-content {
      text-align: center;
      z-index: 1;
      animation: chapterFadeIn 1s ease;
    }

    @keyframes chapterFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .chapter-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: chapterIconBounce 2s ease-in-out infinite;
    }

    @keyframes chapterIconBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .chapter-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: var(--text);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .chapter-subtitle {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      color: var(--text-soft);
      letter-spacing: 0.2em;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .chapter-years {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: var(--rose);
      margin-top: 1rem;
      letter-spacing: 0.3em;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    /* ===== 3D过渡效果 ===== */
    .slide-3d-flip {
      perspective: 1000px;
    }

    .slide-3d-flip .slide {
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
      transform-style: preserve-3d;
    }

    /* ===== 视差效果 ===== */
    .parallax-container {
      position: relative;
      overflow: hidden;
    }

    .parallax-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease-out;
    }

    /* ===== 动画 ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes mediaFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes letterFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInFromRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      /* 首页特殊处理 */
      .slide-hero .page-indicators {
        max-height: 50vh;
        padding: 8px 0;
      }
      
      .page-indicators {
        right: 3px;
        max-height: 50vh;
        padding: 8px 0;
      }
      .indicator-dot {
        width: 6px;
        height: 6px;
        margin: 3px 0;
      }
      .slide-progress {
        bottom: 70px;
      }
      .media-image, .media-video { max-width: 90%; max-height: 50vh; }

    // ===== URL编码函数（处理中文字符 + CDN加速） =====
    function encodeUrl(url) {
      // 如果已经是完整URL，直接返回
      if (url.startsWith('http')) return url;

      // 视频文件使用GitHub raw（避免CDN对大视频的问题）
      if (url.endsWith('.mp4') || url.endsWith('.MP4')) {
        try {
          var parts = url.split('/');
          var encodedParts = parts.map(function(part, index) {
            if (index === 0 || part === '') return part;
            return encodeURIComponent(part);
          });
          return GITHUB_RAW_BASE + encodedParts.join('/');
        } catch (e) {
          return GITHUB_RAW_BASE + url;
        }
      }

      try {
        var parts = url.split('/');
        var encodedParts = parts.map(function(part, index) {
          if (index === 0 || part === '') return part;
          return encodeURIComponent(part);
        });
        // 使用jsDelivr CDN加速
        return CDN_BASE + encodedParts.join('/');
      } catch (e) {
        return CDN_BASE + url;
      }
    }

    // ===== 轮播函数 =====
    function goToPage(page) {
      if (isAnimating || page === currentPage) return;

      isAnimating = true;
      currentPage = page;

      // 暂停所有视频
      pauseAllVideos();

      // 更新容器位置
      sliderContainer.style.transform = 'translateX(-' + (currentPage * 100) + 'vw)';

      // 更新指示器
      for (var i = 0; i < indicatorDots.length; i++) {
        indicatorDots[i].classList.toggle('active', i === currentPage);
      }

      // 更新按钮状态
      prevPageBtn.disabled = currentPage === 0;
      nextPageBtn.disabled = currentPage === totalPages - 1;

      // 重置进度
      progressValue = 0;

      setTimeout(function() {
        isAnimating = false;
      }, 800);
    }

      for (var i = 0; i < videoElements.length; i++) {

    });

      clearTimeout(wheelTimeout);

        if (e.deltaY > 0 && currentPage < totalPages - 1) {
          goToPage(currentPage + 1);
        } else if (e.deltaY < 0 && currentPage > 0) {
          goToPage(currentPage - 1);
        }
      }, 50);
    }, { passive: true });

      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {

      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentPage > 0) goToPage(currentPage - 1);
      }
    });

      touchEndX = e.changedTouches[0].clientX;

    });

    function handleSwipe() {
      var diff = touchStartX - touchEndX;
      if (diff > 50 && currentPage < totalPages - 1) {
        goToPage(currentPage + 1);

        goToPage(currentPage - 1);

    // ===== 🎉 惊喜粒子系统 =====
    (function() {
      var canvas = document.getElementById('surpriseCanvas');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var animationId;

      // 设置画布大小
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // 粒子基类
      function Particle(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type || 'heart';
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = -Math.random() * 3 - 2;
        this.gravity = 0.05;
        this.life = 1;
        this.decay = 0.005 + Math.random() * 0.01;
        this.size = 10 + Math.random() * 15;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.1;
        this.color = getRandomColor(type);
      }

      Particle.prototype.update = function() {
        this.x += this.vx;
        this.vy += this.gravity;
        this.y += this.vy;
        this.life -= this.decay;
        this.rotation += this.rotationSpeed;
        this.vx *= 0.99;
      };

      Particle.prototype.draw = function() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;

        if (this.type === 'heart') {
          drawHeart(ctx, 0, 0, this.size);
        } else if (this.type === 'star') {
          drawStar(ctx, 0, 0, this.size / 2);
        } else if (this.type === 'petal') {
          drawPetal(ctx, 0, 0, this.size);
        } else if (this.type === 'sparkle') {
          drawSparkle(ctx, 0, 0, this.size);
        }

        ctx.restore();
      };

      // 绘制爱心
      function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y + size / 4);
        ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size / 4);
        ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
        ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size / 4);
        ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size / 4);
        ctx.fill();
      }

      // 绘制星星
      function drawStar(ctx, x, y, radius) {
        ctx.beginPath();
        for (var i = 0; i < 5; i++) {
          var angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          var px = x + Math.cos(angle) * radius;
          var py = y + Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

      // 绘制花瓣
      function drawPetal(ctx, x, y, size) {
        ctx.beginPath();
        ctx.ellipse(x, y, size / 2, size, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // 绘制闪光
      function drawSparkle(ctx, x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x - size, y);
        ctx.lineTo(x + size, y);
        ctx.moveTo(x, y - size);
        ctx.lineTo(x, y + size);
        ctx.moveTo(x - size * 0.7, y - size * 0.7);
        ctx.lineTo(x + size * 0.7, y + size * 0.7);
        ctx.moveTo(x + size * 0.7, y - size * 0.7);
        ctx.lineTo(x - size * 0.7, y + size * 0.7);
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 随机颜色
      function getRandomColor(type) {
        var colors = {
          heart: ['#e74c3c', '#ff6b6b', '#ee5a24', '#ff4757', '#ff6348', '#ff3838'],
          star: ['#ffd700', '#ffed4a', '#fff9c4', '#fff59d', '#ffee58'],
          petal: ['#ffb6c1', '#ffc0cb', '#ffb3ba', '#ffcad4', '#f8b4d9', '#e8b4d8'],
          sparkle: ['#fff', '#ffd700', '#87ceeb', '#98fb98', '#dda0dd']
        };
        var arr = colors[type] || colors.heart;
        return arr[Math.floor(Math.random() * arr.length)];
      }

      // 创建粒子爆炸
      function createExplosion(x, y, type, count) {
        count = count || 20;
        for (var i = 0; i < count; i++) {
          var p = new Particle(x, y, type);
          p.vx = (Math.random() - 0.5) * 8;
          p.vy = -Math.random() * 6 - 2;
          particles.push(p);
        }
      }

      // 创建爱心雨
      function createHeartRain() {
        for (var i = 0; i < 30; i++) {
          setTimeout(function() {
            var p = new Particle(
              Math.random() * canvas.width,
              -20 - Math.random() * 100,
              'heart'
            );
            p.vy = Math.random() * 2 + 1;
            p.vx = (Math.random() - 0.5) * 2;
            p.gravity = 0.02;
            p.decay = 0.003;
            particles.push(p);
          }, i * 100);
        }
      }

      // 创建满屏花瓣
      function createPetalShower() {
        for (var i = 0; i < 100; i++) {
          setTimeout(function() {
            var p = new Particle(
              Math.random() * canvas.width,
              -20,
              'petal'
            );
            p.vy = Math.random() * 1 + 0.5;
            p.vx = (Math.random() - 0.5) * 1;
            p.gravity = 0.01;
            p.decay = 0.002;
            p.size = 8 + Math.random() * 12;
            particles.push(p);
          }, i * 50);
        }
      }

      // 创建心形烟花
      function createHeartFirework() {
        var centerX = canvas.width / 2;
        var centerY = canvas.height / 2;
        
        // 创建心形轨迹的粒子
        for (var i = 0; i < 60; i++) {
          var t = (i / 60) * Math.PI * 2;
          var heartX = 16 * Math.pow(Math.sin(t), 3);
          var heartY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
          
          var p = new Particle(centerX, centerY, 'heart');
          p.targetX = centerX + heartX * 10;
          p.targetY = centerY + heartY * 10;
          p.vx = (p.targetX - centerX) / 50;
          p.vy = (p.targetY - centerY) / 50;
          p.gravity = 0;
          p.decay = 0.008;
          p.size = 12;
          particles.push(p);
        }
      }

      // 动画循环
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (var i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();

          if (particles[i].life <= 0) {
            particles.splice(i, 1);
          }
        }

        animationId = requestAnimationFrame(animate);
      }

    // ===== ⌨️ 打字机效果系统 =====
    (function() {
      var typewriterQueue = [];
      var isTyping = false;

      function TypewriterEffect(element, text, speed, callback) {
        this.element = element;
        this.text = text;
        this.speed = speed || 50;
        this.callback = callback;
        this.index = 0;
        this.isHTML = false;
      }

      TypewriterEffect.prototype.type = function() {
        var self = this;
        
        if (this.index < this.text.length) {
          var char = this.text.charAt(this.index);
          this.element.innerHTML += char;
          this.index++;
          
          setTimeout(function() {
            self.type();
          }, this.speed);
        } else {
          isTyping = false;
          if (this.callback) {
            this.callback();
          }
          
          // 处理队列中的下一个
          if (typewriterQueue.length > 0) {
            var next = typewriterQueue.shift();
            next.start();
          }
        }
      };

      TypewriterEffect.prototype.start = function() {
        this.element.innerHTML = '';
        this.index = 0;
        isTyping = true;
        this.type();
      };

      // 应用打字机效果到指定元素
      function applyTypewriter(selector, speed) {
        var elements = document.querySelectorAll(selector);
        elements.forEach(function(el) {
          var originalText = el.innerHTML;
          el.dataset.originalText = originalText;
          el.innerHTML = '';
          
          // 当元素进入视口时触发
          var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting) {
                var typewriter = new TypewriterEffect(el, el.dataset.originalText, speed || 30);
                
                if (isTyping) {
                  typewriterQueue.push(typewriter);
                } else {
                  typewriter.start();
                }
                
                observer.unobserve(el);
              }
            });
          }, { threshold: 0.5 });
          
          observer.observe(el);
        });
      }

      // 导出API
      window.TypewriterEffect = {
        apply: applyTypewriter,
        create: function(element, text, speed, callback) {
          return new TypewriterEffect(element, text, speed, callback);
        }
      };

      // 启用打字机效果
      setTimeout(function() {
        // 信件正文（已禁用 - 内容较长，打字效果影响体验）
        // applyTypewriter('.letter-body', 60);
        // 章节标题（已禁用 - 避免排版问题）

      }, 2000);

    })();

      // 动态光效（鼠标跟随）
      function createDynamicGlow() {
        var glowLayer = document.createElement('div');
        glowLayer.id = 'dynamicGlow';
        glowLayer.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 9997;
          opacity: 0.6;
        `;
        document.body.appendChild(glowLayer);

        var canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        glowLayer.appendChild(canvas);
        
        var ctx = canvas.getContext('2d');
        var mouseX = window.innerWidth / 2;
        var mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', function(e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
        });

        function drawGlow() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          var gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
          gradient.addColorStop(0, 'rgba(201, 132, 106, 0.15)');
          gradient.addColorStop(0.5, 'rgba(201, 132, 106, 0.05)');
          gradient.addColorStop(1, 'transparent');
          
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          requestAnimationFrame(drawGlow);
        }

        drawGlow();
      }

      // 初始化光效
      setTimeout(function() {
        addImageGlow();
        addTextGlow();
        createDynamicGlow();

    // ===== 🎵 音乐渐强效果 =====
    (function() {
      var bgMusic = document.getElementById('bgMusic');
      var originalVolume = 0.3;
      
      function fadeIn(duration) {
        if (!bgMusic) return;
        
        var targetVolume = originalVolume;
        var steps = 20;
        var volumeStep = targetVolume / steps;
        var currentStep = 0;
        
        var interval = setInterval(function() {
          currentStep++;
          bgMusic.volume = volumeStep * currentStep;
          
          if (currentStep >= steps) {
            clearInterval(interval);
          }
        }, duration / steps);
      }

      function fadeOut(duration) {
        if (!bgMusic) return;
        
        var steps = 20;
        var volumeStep = bgMusic.volume / steps;
        var currentStep = 0;
        
        var interval = setInterval(function() {
          currentStep++;
          bgMusic.volume = Math.max(0, bgMusic.volume - volumeStep);
          
          if (currentStep >= steps) {
            clearInterval(interval);
          }
        }, duration / steps);
      }

      // 在特定页面自动渐强音乐
      var specialPages = ['求婚', '婚礼', '婚纱'];
      
      setInterval(function() {
        var currentSlide = slidesData[currentPage];
        if (currentSlide && currentSlide.title) {
          var isSpecial = specialPages.some(function(keyword) {
            return currentSlide.title.includes(keyword);
          });
          
          if (isSpecial && bgMusic.volume < originalVolume) {
            fadeIn(2000);
          }
        }
      }, 5000);

      console.log('🎵 音乐渐强效果已加载！');
    })();

    // ===== 💫 图片悬浮光效 =====
    (function() {
      function addHoverGlow() {
        var images = document.querySelectorAll('.media-image');
        images.forEach(function(img) {
          img.addEventListener('mouseenter', function() {
            this.style.filter = 'brightness(1.1)';
            this.style.boxShadow = '0 0 40px rgba(201, 132, 106, 0.6), 0 20px 60px rgba(74, 55, 40, 0.2)';
          });
          
          img.addEventListener('mouseleave', function() {
            this.style.filter = 'brightness(1)';
            this.style.boxShadow = '0 20px 60px rgba(74, 55, 40, 0.15)';
          });
        });
      }

      setTimeout(addHoverGlow, 1000);
      console.log('💫 图片悬浮光效已加载！');
    })();

    console.log('🎉🎉🎉 所有增强功能已加载完成！享受你的纪念日吧！🎉🎉🎉');
  </script>
</body>
</html>
