<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的纪念日 · 2019 — 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #c9846a;
      --rose-light: #e8c5b8;
      --gold: #b8966e;
      --cream: #fdf8f4;
      --ivory: #f5ede6;
      --text: #4a3728;
      --text-soft: #6b5548;
      --white: #ffffff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Lato', 'Noto Serif SC', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* ===== 轮播容器 ===== */
    .fullpage-slider {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .slider-container {
      display: flex;
      height: 100vh;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .slide {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    /* ===== 页面指示器 ===== */
    .page-indicators {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
      max-height: 80vh;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 10px 0;
    }

    .page-indicators::-webkit-scrollbar {
      display: none;
    }

    .indicator-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(201, 132, 106, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      flex-shrink: 0;
    }

    .indicator-dot:hover {
      background: rgba(201, 132, 106, 0.6);
    }

    .indicator-dot.active {
      background: var(--rose);
      transform: scale(1.3);
      box-shadow: 0 0 15px rgba(201, 132, 106, 0.4);
    }

    .indicator-label {
      position: absolute;
      right: 25px;
      top: 50%;
      transform: translateY(-50%) translateX(100%);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-soft);
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .indicator-dot:hover .indicator-label {
      opacity: 1;
      transform: translateY(-50%) translateX(-35px);
    }

    /* 分类标签 */
    .indicator-group-label {
      font-size: 0.6rem;
      color: var(--text-soft);
      opacity: 0.5;
      text-align: right;
      padding: 5px 0;
      letter-spacing: 0.15em;
    }

    /* ===== 导航箭头 ===== */
    .nav-arrows {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      background: rgba(253, 248, 244, 0.95);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(74, 55, 40, 0.1);
      border: 1px solid var(--rose-light);
    }

    .nav-arrow {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--rose);
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-arrow:hover {
      color: var(--white);
      transform: scale(1.1);
    }

    .nav-arrow:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 播放暂停按钮 */
    .play-pause-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--rose);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-pause-btn:hover {
      color: var(--white);
      transform: scale(1.1);
    }

    /* 进度条 */
    .slide-progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--rose);
      z-index: 10;
      transition: width 0.1s linear;
    }

    /* ===== Hero 页面 ===== */
    .slide-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(201,132,106,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(184,150,110,0.10) 0%, transparent 60%),
        var(--cream);
    }

    .hero-date {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--rose);
    }

    .hero-subtitle {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .day-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .day-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 600;
      color: var(--rose);
      line-height: 1;
    }

    .day-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-soft);
      text-transform: uppercase;
    }

    /* ===== 图片/视频/PDF 页面 ===== */
    .slide-media {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px) brightness(1.1) saturate(0.7);
      transform: scale(1.05);
    }

    .media-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 900px;
      padding: 2rem;
      text-align: center;
      animation: mediaFadeIn 1s ease;
    }

    .media-image, .media-video {
      max-width: 85%;
      max-height: 60vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(74, 55, 40, 0.15);
    }

    .media-video {
      background: #000;
    }

    .pdf-container {
      width: 64%;
      height: 72vh;
      max-width: 1040px;
      max-height: 720px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(74, 55, 40, 0.15);
      overflow: hidden;
    }

    .pdf-container embed,
    .pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .media-text {
      margin-top: 2rem;
      padding: 1.2rem 1.5rem;
      background: rgba(253, 248, 244, 0.85);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      animation: mediaFadeIn 1s ease 0.3s both;
      max-width: 650px;
    }

    .media-date {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .media-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: var(--text);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .media-quote {
      font-size: 1.05rem;
      color: var(--text-soft);
      line-height: 1.9;
      font-style: italic;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    /* ===== 信 ===== */
    .slide-letter {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(201,132,106,0.08) 0%, transparent 50%),
        var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .letter-card {
      max-width: 700px;
      background: var(--white);
      border-radius: 4px;
      padding: 4rem 4.5rem;
      box-shadow:
        0 2px 4px rgba(74,55,40,0.06),
        0 20px 80px rgba(74,55,40,0.1);
      position: relative;
      animation: letterFadeIn 1s ease;
    }

    .letter-card::before {
      content: '';
      position: absolute;
      top: 2.5rem; bottom: 2.5rem;
      left: 3rem;
      width: 1px;
      background: rgba(232, 197, 184, 0.5);
    }

    .letter-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--ivory);
    }

    .letter-date {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
    }

    .letter-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--rose);
    }

    .letter-body {
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1rem;
      line-height: 2;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 2.5rem;
    }

    .letter-sign {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-soft);
      text-align: right;
      font-size: 1rem;
    }

    /* ===== 情感终章 ===== */
    .slide-final {
      background:
        radial-gradient(ellipse at 50% 30%, rgba(201,132,106,0.15) 0%, transparent 50%),
        linear-gradient(180deg, var(--cream) 0%, var(--ivory) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .final-ornament {
      font-size: 3rem;
      color: var(--rose-light);
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .final-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      color: var(--text);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .final-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--rose);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .final-content {
      max-width: 750px;
      font-family: 'Noto Serif SC', serif;
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 2.2;
      color: var(--text);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .final-content p {
      margin-bottom: 1.5rem;
    }

    .final-content em {
      color: var(--rose);
      font-style: italic;
    }

    .final-heart {
      font-size: 2rem;
      color: var(--rose);
      margin-top: 1rem;
      animation: heartBeat 1.5s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
    }

    .final-footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--text-soft);
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    /* ===== 动画 ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes mediaFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes letterFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .page-indicators {
        right: 15px;
      }
      .media-image, .media-video { max-width: 90%; max-height: 65vh; }
      .media-video { max-height: 50vh; background: #000; }
      .pdf-container { width: 64vw; height: 75vh; max-height: 600px; -webkit-overflow-scrolling: touch; min-height: 400px; }
      .pdf-container embed { display: block; width: 100%; height: 100%; object-fit: contain; }
      .media-bg { }
      .media-title { font-size: 1.5rem; }
      .media-quote { font-size: 0.9rem; }
      .media-text { padding: 0.8rem 1rem; min-height: 80px; }
      .media-date, .media-title, .media-quote { text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4); }
      .media-content { padding: 1rem; max-width: 95%; }
      .letter-card { padding: 2.5rem 1.8rem; max-width: 95%; overflow-y: auto; max-height: 90vh; }
      .letter-card::before { display: none; }
      .nav-arrows { bottom: 20px; padding: 0.6rem 1.5rem; }
      .nav-arrow, .play-pause-btn { width: 38px; height: 38px; }
      .nav-arrow { width: 40px; height: 40px; font-size: 1rem; }
      .final-title { font-size: 1.8rem; }
      .final-subtitle { font-size: 1.2rem; }
      .final-content { font-size: 1rem; }
    }

    /* 音乐控制按钮 */
    .music-control {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(253, 248, 244, 0.95);
      border: 2px solid var(--rose-light);
      color: var(--rose);
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(74, 55, 40, 0.1);
    }

    .music-control:hover {
      background: var(--rose);
      color: var(--white);
      transform: scale(1.1);
    }

    .music-control.playing #musicIcon {
      animation: musicPulse 2s ease-in-out infinite;
    }

    @keyframes musicPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>

    function encodeUrl(url) {
      try {
        var parts = url.split('/');
        var encodedParts = parts.map(function(part, index) {
          if (index === 0 || part === '') return part;
          return encodeURIComponent(part);
        });
        return encodedParts.join('/');
      } catch (e) {
        return url;
      }
    }

        var encodedSrc = encodeUrl(slide.src);
        // 获取完整URL用于Google Docs Viewer
        var fullUrl = window.location.origin + window.location.pathname.replace('index.html', '') + slide.src;
        var googleViewerUrl = 'https://docs.google.com/gview?embedded=true&url=' + encodeURIComponent(fullUrl);
        // 检测是否为移动设备
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var pdfHtml = '';
        if (isMobile) {
          // 移动端使用iframe + 下载按钮
          pdfHtml = '<div class="pdf-container" style="position:relative;">' +
            '<iframe src="' + googleViewerUrl + '" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>' +
            '<a href="' + encodedSrc + '" download class="pdf-download-btn" style="position:absolute;bottom:10px;right:10px;background:var(--rose);color:white;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:0.9rem;box-shadow:0 2px 8px rgba(0,0,0,0.2);">📥 下载PDF</a>' +
            '</div>';
        } else {
          // 桌面端使用embed
          pdfHtml = '<div class="pdf-container">' +
            '<embed src="' + encodedSrc + '#toolbar=0&navpanes=0&scrollbar=0&zoom=100" type="application/pdf" width="100%" height="100%" />' +
            '</div>';
        }
        slideEl.innerHTML = '<div class="media-content" style="width:100%;max-width:95%;">' +
          pdfHtml +
          '<div class="media-text" style="margin-top:1rem;">' +
          '<div class="media-date">' + slide.date + '</div>' +
          '<h2 class="media-title">' + slide.title + '</h2>' +
          '<p class="media-quote">"' + slide.quote + '"</p>' +
          '</div></div>';
      } else if (slide.type === 'letter') {
        slideEl.classList.add('slide-letter');
        slideEl.innerHTML = '<div class="letter-card">' +
          '<div class="letter-header">' +
          '<p class="letter-date">2026 · 03 · 18</p>' +
          '<p class="letter-greeting">亲爱的，</p>' +
          '</div>' +
          '<div class="letter-body">' +
          '还记得我们第一次见面的样子吗？\n' +
          '那时阳光正好，你微笑着向我走来。\n\n' +
          '我们一起走过了这么多地方：\n' +
          '千岛湖的湖光山色，云南的洱海骑行，\n' +
          '桂林的漓江泛舟，马来西亚的海岛漫步……\n\n' +
          '每一次旅行，每一个瞬间，\n' +
          '我都想永远珍藏。\n\n' +
          '你说愿意的那一天，\n' +
          '是我这辈子最幸福的时刻。\n' +
          '你眼里的泪光，比任何风景都美。\n\n' +
          '现在，我们在一起已经这么久了。\n' +
          '未来的路还很长，\n' +
          '但我很确定，只要和你在一起，\n' +
          '哪里都是最好的风景。\n\n' +
          '谢谢你选择了我，\n' +
          '谢谢你成为我生命中最重要的人。\n\n' +
          '愿我们的余生，\n' +
          '一直这样甜蜜地走下去。' +
          '</div>' +
          '<p class="letter-sign">— 爱你的人，2026 年 3 月 18 日</p>' +
          '</div>';
      } else if (slide.type === 'final') {
        slideEl.classList.add('slide-final');
        slideEl.innerHTML = '<div class="final-ornament">✦</div>' +
          '<h2 class="final-title">余生请多指教</h2>' +
          '<p class="final-subtitle">To one who makes my heart smile</p>' +
          '<div class="final-content">' +
          '<p>从2019年的初春到如今，两千多个日夜，我们一起走过了四季轮回。</p>' +
          '<p>那些平凡的日子，因为有你而变得闪闪发光。每一个清晨的问候，每一个深夜的陪伴，每一次旅途中的欢笑，都是我生命中最珍贵的宝藏。</p>' +
          '<p><em>你说，遇见我是你这辈子最幸运的事。</em></p>' +
          '<p><em>我要说，我才是那个被幸运眷顾的人。</em></p>' +
          '<p>爱情最美好的样子，不是轰轰烈烈的誓言，而是细水长流的陪伴。是一起做饭时的烟火气，是一起看电影时的默契，是吵架后一个拥抱就能化解的温柔。</p>' +
          '<p>谢谢你，把最美好的青春给了我。</p>' +
          '<p>未来的路还很长，但我知道，无论风雨，无论风景，只要牵着手，我们就无所畏惧。</p>' +
          '</div>' +
          '<div class="final-heart">❤</div>' +
          '<p class="final-footer">Forever & Always · 2019 — ∞</p>';
      }

      sliderContainer.appendChild(slideEl);
    });

    // 创建指示器（带分组标签）
    var lastGroup = '';
    slidesData.forEach(function(slide, index) {
      var group = slide.type === 'hero' ? '开始' :
                  slide.type === 'letter' ? '书信' :
                  slide.type === 'final' ? '终章' : '回忆';

      if (group !== lastGroup && slide.label) {
        var groupLabel = document.createElement('div');
        groupLabel.className = 'indicator-group-label';
        groupLabel.textContent = group;
        pageIndicators.appendChild(groupLabel);
        lastGroup = group;
      }

      var dot = document.createElement('div');
      dot.className = 'indicator-dot' + (index === 0 ? ' active' : '');
      dot.dataset.page = index;

      if (slide.label) {
        var label = document.createElement('span');
        label.className = 'indicator-label';
        label.textContent = slide.label;
        dot.appendChild(label);
      }

      (function(idx) {
        dot.addEventListener('click', function() {
          goToPage(idx);
        });
      })(index);

      pageIndicators.appendChild(dot);
    });

    var indicatorDots = pageIndicators.querySelectorAll('.indicator-dot');

    // ===== 轮播函数 =====
    function goToPage(page) {
      if (isAnimating || page === currentPage) return;

      isAnimating = true;
      currentPage = page;

      // 暂停所有视频
      pauseAllVideos();

      // 更新容器位置
      sliderContainer.style.transform = 'translateX(-' + (currentPage * 100) + 'vw)';

      // 更新指示器
      for (var i = 0; i < indicatorDots.length; i++) {
        indicatorDots[i].classList.toggle('active', i === currentPage);
      }

      // 更新按钮状态
      prevPageBtn.disabled = currentPage === 0;
      nextPageBtn.disabled = currentPage === totalPages - 1;

      // 重置进度
      progressValue = 0;

      setTimeout(function() {
        isAnimating = false;
      }, 800);
    }

    function pauseAllVideos() {
      for (var i = 0; i < videoElements.length; i++) {
        var vid = document.getElementById('video_' + videoElements[i].index);
        if (vid) {
          vid.pause();
        }
      }
    }

    // ===== 导航事件 =====
    prevPageBtn.addEventListener('click', function() {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextPageBtn.addEventListener('click', function() {
      if (currentPage < totalPages - 1) goToPage(currentPage + 1);
    });

    // 鼠标滚轮控制
    var wheelTimeout;
    document.addEventListener('wheel', function(e) {
      clearTimeout(wheelTimeout);
      wheelTimeout = setTimeout(function() {
        if (e.deltaY > 0 && currentPage < totalPages - 1) {
          goToPage(currentPage + 1);
        } else if (e.deltaY < 0 && currentPage > 0) {
          goToPage(currentPage - 1);
        }
      }, 50);
    }, { passive: true });

    // 键盘控制
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentPage < totalPages - 1) goToPage(currentPage + 1);
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentPage > 0) goToPage(currentPage - 1);
      }
    });

    // 触摸滑动支持
    var touchStartX = 0;
    var touchEndX = 0;

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      var diff = touchStartX - touchEndX;
      if (diff > 50 && currentPage < totalPages - 1) {
        goToPage(currentPage + 1);
      } else if (diff < -50 && currentPage > 0) {
        goToPage(currentPage - 1);
      }
    }

    // ===== 自动播放动画 =====
    function animateProgress() {
      if (autoPlay) {
        // 检查是否有视频正在播放
        var videoPlaying = false;
        for (var i = 0; i < videoElements.length; i++) {
          var vid = document.getElementById('video_' + videoElements[i].index);
          if (vid && !vid.paused) {
            videoPlaying = true;
            break;
          }
        }

        if (!videoPlaying) {
          progressValue += 16;

          // 根据页面类型设置不同时长
          var currentSlideType = slidesData[currentPage] ? slidesData[currentPage].type : '';
          var currentDuration = slideDuration;
          if (currentSlideType === 'letter' || currentSlideType === 'final') {
            currentDuration = 120000; // 最后两页120秒
          }

          var progressPercent = (progressValue / currentDuration) * 100;
          slideProgressEl.style.width = progressPercent + '%';

          if (progressValue >= currentDuration) {
            if (currentPage < totalPages - 1) {
              goToPage(currentPage + 1);
            } else {
              progressValue = 0;
            }
          }
        }
      }
      animationFrame = requestAnimationFrame(animateProgress);
    }

    // 播放暂停按钮
    playPauseBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      autoPlay = !autoPlay;
      playPauseBtn.textContent = autoPlay ? '⏸' : '▶';
      slideProgressEl.style.opacity = autoPlay ? '1' : '0.3';
    });

    // 初始化
    prevPageBtn.disabled = true;

    // 天数计算
    (function() {
      var start = new Date('2019-02-24');
      var now = new Date();
      var days = Math.floor((now - start) / 86400000);
      var dayCountEl = document.getElementById('dayCount');
      var dayWordEl = document.getElementById('dayWord');
      if (dayCountEl) dayCountEl.textContent = days.toLocaleString('zh-CN');
      if (dayWordEl) dayWordEl.textContent = days.toLocaleString('zh-CN');
    })();

    // ===== 背景音乐控制 =====
    var bgMusic = document.getElementById('bgMusic');
    var musicControl = document.getElementById('musicControl');
    var musicIcon = document.getElementById('musicIcon');
    var musicPlaying = false;
    var musicWasPlayingBeforeVideo = false; // 记录视频播放前音乐的状态

    // 自动播放音乐
    function playMusic() {
      if (bgMusic) {
        bgMusic.volume = 0.3;
        bgMusic.play().then(function() {
          musicPlaying = true;
          musicControl.classList.add('playing');
          musicIcon.textContent = '🔊';
          console.log('音乐播放成功');
        }).catch(function(err) {
          console.log('音乐播放失败:', err);
          console.log('音乐文件:', bgMusic.src);
          // 自动播放失败，等待用户点击
          musicPlaying = false;
          musicControl.classList.remove('playing');
          musicIcon.textContent = '🎵';
        });
      }
    }

    // 确保音乐循环播放（双重保障）
    bgMusic.addEventListener('ended', function() {
      if (musicPlaying || musicWasPlayingBeforeVideo) {
        bgMusic.currentTime = 0;
        bgMusic.play().catch(function(err) {
          console.log('循环播放失败:', err);
        });
      }
    });

    // 点击按钮切换音乐
    musicControl.addEventListener('click', function() {
      if (bgMusic && !musicPlaying) {
        bgMusic.play().then(function() {
          musicPlaying = true;
          musicControl.classList.add('playing');
          musicIcon.textContent = '🔊';
          console.log('音乐播放成功');
        }).catch(function(err) {
          console.log('音乐播放失败:', err);
        });
      } else if (bgMusic && musicPlaying) {
        bgMusic.pause();
        musicPlaying = false;
        musicControl.classList.remove('playing');
        musicIcon.textContent = '🎵';
        console.log('音乐已暂停');
      }
    });

    // 监听所有视频的播放和结束事件
    function setupVideoListeners() {
      var videos = document.querySelectorAll('video');
      videos.forEach(function(video) {
        // 视频开始播放时，记录音乐状态并降低音量
        video.addEventListener('play', function() {
          if (musicPlaying) {
            musicWasPlayingBeforeVideo = true;
            bgMusic.volume = 0.05; // 降低背景音乐音量，不完全停止
          }
        });

        // 视频暂停时，恢复音乐
        video.addEventListener('pause', function() {
          if (musicWasPlayingBeforeVideo) {
            bgMusic.volume = 0.3;
            if (bgMusic.paused) {
              bgMusic.play().catch(function(err) {
                console.log('恢复音乐失败:', err);
              });
            }
          }
        });

        // 视频结束时，恢复音乐
        video.addEventListener('ended', function() {
          if (musicWasPlayingBeforeVideo) {
            bgMusic.volume = 0.3;
            bgMusic.play().catch(function(err) {
              console.log('恢复音乐失败:', err);
            });
            musicWasPlayingBeforeVideo = false;
          }
        });
      });
    }

    // 页面加载完成后自动播放音乐
    window.addEventListener('load', function() {
      setTimeout(function() {
        playMusic();
        setupVideoListeners();
      }, 1000);
    });

    // 开始自动播放
    animateProgress();
  </script>
</body>
</html>
